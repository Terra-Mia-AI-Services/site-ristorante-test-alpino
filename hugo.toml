baseURL = "https://site-ristorante-test-alpino.pages.dev"
languageCode = "it"
defaultContentLanguage = "it"
title = "Ristorante Test Alpino"

[params]
  site_name = "Ristorante Test Alpino"
  description = "Ristorante tipico di montagna con cucina tradizionale tirolese"
  slogan = "Il gusto della montagna"
  business_type = "ristorante"
  contact_email = "info@testalpino.it"
  contact_phone = "+39 0471 123456"
  whatsapp = "+39 0471 123456"
  address = "Via Roma 1"
  city = "Bolzano"
  province = "BZ"
  cap = "39100"
  instagram = ""
  facebook = ""
  tripadvisor = ""
  google_business = ""
  tiktok = ""
  youtube = ""
  linkedin = ""
  opening_hours = ""
  style = "rustico"
  layout = "hero_grande"
  font = "classico"
  primary_color = "#8B4513"
  accent_color = "#D2691E"
  package = "starter"
  site_features = ["form_contatti", "whatsapp", "maps_embed", "seo"]

  [params.page_slugs_by_lang.servizi]
    en = "services"
    it = "servizi"
  [params.page_slugs_by_lang.contatti]
    en = "contact"
    it = "contatti"
  [params.page_slugs_by_lang.homepage]
    en = ""
    it = ""
  [params.page_slugs_by_lang.chi_siamo]
    en = "about"
    it = "chi-siamo"
  [params.page_slugs_by_lang.cookie_privacy]
    en = "privacy"
    it = "privacy"

[languages]
  [languages.it]
    contentDir = "content/it"
    languageName = "Italiano"
    languageCode = "it"
    weight = 1
    title = "Ristorante Test Alpino"
  [languages.it.menu]
    [[languages.it.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/"
      weight = 1
    [[languages.it.menu.main]]
      identifier = "chi_siamo"
      name = "Chi siamo"
      url = "/chi-siamo/"
      weight = 2
    [[languages.it.menu.main]]
      identifier = "servizi"
      name = "Servizi"
      url = "/servizi/"
      weight = 3
    [[languages.it.menu.main]]
      identifier = "contatti"
      name = "Contatti"
      url = "/contatti/"
      weight = 4
    [[languages.it.menu.main]]
      identifier = "cookie_privacy"
      name = "Privacy"
      url = "/privacy/"
      weight = 5
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    languageCode = "en"
    weight = 2
    title = "Ristorante Test Alpino"
  [languages.en.menu]
    [[languages.en.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      identifier = "chi_siamo"
      name = "About"
      url = "/about/"
      weight = 2
    [[languages.en.menu.main]]
      identifier = "servizi"
      name = "Services"
      url = "/services/"
      weight = 3
